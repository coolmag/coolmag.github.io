<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aurora Vibe | AI-Powered Web Radio</title>
    
    <meta name="description" content="Погрузитесь в мир Aurora Vibe — уникального AI-радио с живым видео-фоном.">
    <meta name="theme-color" content="#111111">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --glass-bg: rgba(20, 20, 25, 0.4);
            --glass-border: rgba(255, 255, 255, 0.15);
            --neon-blue: #00f3ff;
            --neon-pink: #ff00ea;
        }
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            font-family: 'Montserrat', sans-serif;
            background-color: #050505; color: white; overflow-x: hidden;
        }
        #video-background {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            z-index: 1; object-fit: cover; object-position: center;
            pointer-events: none; filter: blur(15px) brightness(0.6) contrast(1.2);
            transform: scale(1.1);
        }
        .vignette-overlay {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            z-index: 1; background: radial-gradient(circle at center, transparent 0%, rgba(0,0,0,0.8) 100%);
            pointer-events: none;
        }
        
        /* Главный контейнер страницы */
        .page-content {
            position: relative; z-index: 2; padding: 2vh 15px;
            display: flex; flex-direction: column; align-items: center;
            min-height: 100vh; box-sizing: border-box;
            max-width: 800px; margin: 0 auto;
        }

        /* Верхняя шапка (теперь компактная) */
        .header-container {
            background: var(--glass-bg); border-radius: 20px;
            backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            width: 100%; padding: 15px 20px; text-align: center;
            margin-bottom: 15px; box-sizing: border-box;
        }
        h1 {
            font-size: 2em; font-weight: 900; margin: 0 0 5px 0;
            background: linear-gradient(90deg, var(--neon-blue), var(--neon-pink));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            text-transform: uppercase; letter-spacing: 2px;
        }
        .header-container p {
            font-size: 0.9em; line-height: 1.4; color: #e0e0e0; margin: 0;
        }

        /* Плеер (занимает основное место) */
        .web-player {
            width: 100%; flex-grow: 1; min-height: 450px; border-radius: 20px;
            border: 1px solid var(--glass-border);
            box-shadow: 0 10px 30px rgba(0,0,0,.8), inset 0 0 20px rgba(255,255,255,.05);
            background: rgba(10,10,15,.3); backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px); margin-bottom: 15px;
        }

        /* Нижняя панель с кнопками в ряд */
        .bottom-bar {
            background: var(--glass-bg); border-radius: 20px;
            backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            width: 100%; padding: 15px; box-sizing: border-box;
            display: flex; flex-direction: row; justify-content: center; align-items: center;
            gap: 15px;
        }

        /* Кнопки */
        .cta-button {
            display: inline-flex; align-items: center; justify-content: center;
            background: linear-gradient(45deg, #0088cc, #005580);
            color: #fff; padding: 12px 20px; font-size: 1em; font-weight: 700;
            text-decoration: none; border-radius: 15px; transition: all .3s ease;
            box-shadow: 0 4px 15px rgba(0,136,204,.4); border: 1px solid rgba(255,255,255,.1);
            flex: 1; /* Растягивает кнопки равномерно */
            white-space: nowrap;
        }
        .cta-button:hover {
            transform: scale(1.02); background: linear-gradient(45deg, #00aaff, #0077b3);
        }
        .donate-button {
            background: linear-gradient(45deg, #c20090, #7a005a);
            box-shadow: 0 4px 15px rgba(255, 0, 234, 0.4);
        }
        .donate-button:hover {
            background: linear-gradient(45deg, #ff00ea, #b300a4);
        }

        /* Мини QR-код для ПК */
        .qr-mini {
            width: 48px; height: 48px; border-radius: 10px;
            border: 2px solid var(--neon-pink); object-fit: cover;
            box-shadow: 0 0 10px rgba(255, 0, 234, 0.3); transition: transform 0.3s;
        }
        .qr-mini:hover { transform: scale(1.5); }

        /* Виджет алертов */
        .donation-alert-widget {
            position: fixed; top: 10px; right: 10px; width: 350px; height: 300px;
            border: none; z-index: 9999; pointer-events: none;
        }

        /* Адаптация под телефоны */
        @media (max-width: 768px) {
            h1 { font-size: 1.5em; }
            .header-container { padding: 10px 15px; }
            .bottom-bar { padding: 10px; gap: 10px; }
            .cta-button { font-size: 0.85em; padding: 10px 5px; }
            .qr-mini { display: none; } /* Прячем QR на телефонах */
            .donation-alert-widget { width: 100%; top: 5px; right: 0; }
        }
    </style>
</head>
<body>
    <video autoplay muted loop playsinline id="video-background">
        <source src="https://coolmag.github.io/avatar.mp4" type="video/mp4">
    </video>
    
    <div class="vignette-overlay"></div>
    
    <!-- Невидимый виджет алертов от DonatePay -->
    <iframe class="donation-alert-widget" src="https://widget.donatepay.ru/alert-box/widget/11cbd6bc2d99c42feb866fa80432f47569a4c632d42ec8b10fb2bda4b694f8f4" allowtransparency="true"></iframe>

    <div class="page-content">
        
        <!-- Шапка (сверху) -->
        <div class="header-container">
            <h1>Aurora Vibe</h1>
            <p>Первая нейро-радиостанция в Telegram. Слушай треки и управляй эфиром.</p>
        </div>
        
        <!-- Плеер (по центру) -->
        <iframe class="web-player" src="https://newbot99-production.up.railway.app/?v=3" frameborder="0" allowtransparency="true" allow="autoplay; encrypted-media"></iframe>

        <!-- Панель кнопок (снизу) -->
        <div class="bottom-bar">
            <a href="https://t.me/coolmagDJ" class="cta-button" target="_blank" rel="noopener noreferrer">
                🚀 Telegram
            </a>
            <a href="https://donatepay.ru/don/1480259" class="cta-button donate-button" target="_blank" rel="noopener noreferrer">
                💖 Поддержать
            </a>
            <img src="donate-qr.png" alt="QR-код" class="qr-mini" title="Отсканируй для доната">
        </div>

    </div>
</body>
</html>
